---
- hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Install Python 3.9 using raw command
      raw: apt-get update && apt-get install -y python3.9 python3.9-minimal

    - name: Set python3 alternative to python3.9
      raw: update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 1

- hosts: all
  become: yes
  tasks:
    - name: Gather facts now that Python 3.9 is active
      setup: